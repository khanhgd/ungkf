<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chemical Elements</title>
    <meta name="description" content="A dynamic, beautifully designed list and grid of all 118 chemical elements.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Video Background -->
    <video id="bgVideo" autoplay muted loop playsinline>
        <source src="tiktok_video_2.mp4" type="video/mp4">
    </video>

    <!-- Background Music -->
    <audio id="bgMusic" loop preload="auto">
        <source src="Chúng Ta Sau Này.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Toggle Button -->
    <button id="musicToggle" class="music-btn" title="Play Music">
        <span class="music-icon">🎵</span>
    </button>

    <div id="app">
        <header>
            <h1>The Elements</h1>
            <p>Explore the fundamental building blocks of the universe</p>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name, symbol, or atomic number...">
            </div>
            <div class="view-toggles">
                <button id="gridBtn" class="active">Grid View</button>
                <button id="listBtn">List View</button>
            </div>
        </header>

        <main>
            <div id="elementsContainer" class="element-grid"></div>
        </main>
        
        <!-- Element Detail Modal -->
        <div id="elementModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-glow"></div>
                <button class="close-btn" id="closeModal">&times;</button>
                <div class="modal-content-inner">
                    <div class="modal-symbol" id="modalSymbol"></div>
                    <div class="modal-title-group">
                        <h2 id="modalName"></h2>
                        <span class="modal-atomic-number">Atomic Number: <span id="modalAtomicNumber"></span></span>
                    </div>
                    <div class="info-card">
                        <div class="info-row">
                            <span class="info-label">Category</span>
                            <span class="info-value category-badge" id="modalCategory"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Standard Atomic Weight</span>
                            <span class="info-value" id="modalMass"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="shader.js"></script>
    <script src="main.js"></script>
</body>
</html>
